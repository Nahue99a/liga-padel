<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga de Pádel</title>
<style>
  :root {
    /* Palette requested: deep blue background, slate cards, white text, soft secondary, green accent */
    --bg: #0F172A;
    --card: #1E293B;
    --border: rgba(255,255,255,0.06);
    --text: #F8FAFC;
    --text-secondary: #CBD5E1;
    --text-tertiary: rgba(203,213,225,0.8);
    --accent: #22C55E;
    --header-bg: rgba(255,255,255,0.03);
    --success-bg: rgba(34,197,94,0.12);
    --success-text: #22C55E;
    --shadow: 0 8px 24px rgba(2,6,23,0.65);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 28px 18px 64px;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  .wrap { max-width: 760px; margin: 0 auto; position: relative; }

  .page-header { display:flex; flex-wrap: wrap; justify-content:space-between; align-items:center; gap:18px; margin-bottom: 20px; }
  .page-header-left { flex:1; min-width: 0; }
  h1 { font-size: 22px; font-weight: 700; margin: 0 0 6px; }
  .subtitle { font-size: 14px; color: var(--text-secondary); margin: 0; }

  .status { font-size: 12px; color: var(--text-tertiary); margin-bottom: 18px; display:flex; gap:8px; align-items:center; }
  .dot { width:8px; height:8px; border-radius:50%; background: var(--accent); box-shadow: 0 0 0 rgba(0,0,0,0.1); }
  .dot.syncing { animation: pulse 1.6s infinite; }
  @keyframes pulse { 0%{ transform:scale(1); }50%{ transform:scale(1.2); }100%{ transform:scale(1); } }

  section { margin-bottom: 28px; }
  .section-label { font-size:13px; color:var(--text-secondary); margin:0 0 8px; font-weight:600; }

  /* Table - styled as a card */
  table { width:100%; border-collapse:collapse; background: var(--card); border-radius:12px; overflow:hidden; font-size:14px; box-shadow: 0 8px 20px rgba(2,6,23,0.6); }
  thead tr { background: var(--header-bg); }
  th { text-align:center; padding:12px 12px; font-weight:600; color:var(--text-secondary); font-size:13px; }
  th:first-child { text-align:left; padding-left:18px; }
  tbody tr { border-top:1px solid rgba(255,255,255,0.03); transition: background 0.12s, transform 0.12s; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  td { padding:12px 12px; text-align:center; color:var(--text); }
  td:first-child { text-align:left; padding-left:18px; font-weight:600; }
  td.pts { font-weight:700; }

  /* Match cards */
  .match-card { background: var(--card); border-radius:12px; padding:14px 16px; margin-bottom:14px; border:1px solid rgba(255,255,255,0.03); box-shadow: 0 8px 20px rgba(2,6,23,0.45); transition: transform 0.14s, box-shadow 0.14s; }
  .match-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
  .match-date { font-size:12px; color:var(--text-secondary); margin:0 0 10px; }
  .match-row { display:flex; gap:12px; align-items:center; }

  /* Team buttons - pill */
  .team-btn { flex:1; padding:10px 14px; border-radius:999px; background:transparent; border:1px solid var(--border); color:var(--text); font-weight:600; cursor:pointer; transition: background .12s, transform .12s, border-color .12s, box-shadow .12s; }
  .team-btn:hover { background: rgba(255,255,255,0.03); transform: translateY(-2px); border-color: rgba(34,197,94,0.45); box-shadow: 0 8px 18px rgba(2,6,23,0.5); }
  .team-btn.winner { background: var(--accent); color: #06220b; border-color: rgba(34,197,94,0.6); box-shadow: 0 6px 14px rgba(34,197,94,0.12) inset; }
  .team-btn.winner::after { content: '  🏆'; }
  .team-btn:disabled { opacity:0.6; cursor:not-allowed; }
  .vs { font-size:12px; color:var(--text-secondary); }

  /* Pin / control bar */
  .pin-bar { display:flex; gap:8px; align-items:center; background: var(--card); padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.03); box-shadow: 0 8px 20px rgba(2,6,23,0.45); }
  .pin-bar input { flex:1; background: rgba(255,255,255,0.02); border:none; color:var(--text); padding:10px 12px; border-radius:8px; }
  .pin-bar button { border:1px solid var(--border); background:transparent; color:var(--text); padding:8px 12px; border-radius:8px; cursor:pointer; }
  .pin-bar button:hover { background: rgba(255,255,255,0.03); border-color: var(--accent); }

  /* Theme toggle small icon */
  .theme-toggle { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); display:inline-flex; align-items:center; justify-content:center; background:transparent; color:var(--text); cursor:pointer; position:relative; top:0; }
  .theme-toggle:hover { background: rgba(255,255,255,0.03); transform: translateY(-2px); }
  .theme-toggle[title]::after {
    content: attr(title);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    background: rgba(15,23,42,0.92);
    color: #f8fafc;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 12px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.16s ease;
    z-index: 2;
  }
  .theme-toggle:hover::after { opacity: 1; }

  /* Light theme override */
  .light {
    --bg: #F8FAFC;
    --card: #ffffff;
    --border: rgba(15,23,42,0.08);
    --text: #0F172A;
    --text-secondary: #475569;
    --text-tertiary: rgba(71,85,105,0.8);
    --accent: #22C55E;
    --header-bg: #F1F5F9;
    --success-bg: rgba(34,197,94,0.16);
    --shadow: 0 10px 30px rgba(15,23,42,0.12);
  }

  /* Tabs */
  .tabs { display:flex; gap:8px; margin:0 0 12px; }
  .tab-btn { padding:8px 12px; border-radius:10px; border:1px solid rgba(255,255,255,0.03); background:transparent; color:var(--text-secondary); cursor:pointer; font-weight:600; }
  .tab-btn.active { background: rgba(255,255,255,0.02); color:var(--text); box-shadow: 0 8px 20px rgba(2,6,23,0.45); border-color: rgba(255,255,255,0.06); }
  .tab-btn:hover { border-color: var(--accent); color:var(--text); transform: translateY(-2px); }

  .unlocked-badge { font-size:13px; color:var(--accent); font-weight:700; }

  .error-banner { background: #3b0b0b; color:#ffd6d6; border-radius:10px; padding:10px 14px; display:none; }

  @media (max-width:520px){
    .wrap{padding:12px;}
    .team-btn{padding:10px;}
    .page-header { flex-direction: column; align-items: stretch; gap: 12px; }
    .page-header-left { display: flex; flex-direction: column; gap: 6px; }
    .theme-toggle { margin-left: auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏆 Liga de pádel</h1>
  <p class="subtitle">Gonza · Roman · Luis · Nahue — 3 puntos por victoria, parejas rotativas</p>

  <div class="page-header">
    <div class="page-header-left">
      <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Conectando...</span></div>
    </div>
    <button id="themeToggle" class="theme-toggle" title="Cambiar a modo oscuro" aria-label="Cambiar tema">☀️</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="pin-bar" id="pinBar">
    <input type="password" id="pinInput" placeholder="PIN para editar" inputmode="numeric" />
    <button id="pinBtn">🔒 Desbloquear</button>
  </div>

  <section>
    <p class="section-label">Tabla de posiciones</p>
    <table>
      <thead>
        <tr><th style="text-align:left;">Jugador</th><th>PJ</th><th>PG</th><th>PP</th><th>Pts</th></tr>
      </thead>
      <tbody id="standingsBody"></tbody>
    </table>
  </section>

  <section>
    <p class="section-label">Fixture</p>
    <div class="tabs">
      <button id="tabFixture" class="tab-btn active">📅 Junio</button>
      <button id="tabNext" class="tab-btn">📅 Julio</button>
    </div>
    <div id="matchesList"></div>
    <div id="nextMatchesList" style="display:none;"></div>
  </section>
</div>

<script>
/* ====== CONFIGURACIÓN ====== */
// 1) Creá una cuenta gratis en https://jsonbin.io y andá a "API Keys" para obtener tu X-Master-Key.
// 2) Pegala acá abajo.
const JSONBIN_API_KEY = "$2a$10$mQAnS1Kq..VZt6Q2exLO.uLI23BXVLmVtjWgbTZ1sc4XpHwm4JpGG";
// 3) La primera vez que abras el sitio con una API key válida y sin BIN_ID,
//    se crea el bin automáticamente y te va a mostrar el ID en la consola/alerta.
//    Pegá ese ID acá para que todos lean/escriban el mismo bin.
let BIN_ID = "6a354225da38895dfedd9a54";

// PIN para habilitar edición (cambialo por el que quieras, son solo números o texto)
const EDIT_PIN = "2580";
/* ============================ */

const JSONBIN_BASE = "https://api.jsonbin.io/v3/b";

const players = ["Gonza", "Roman", "Luis", "Nahue"];

const defaultMatches = [
  { id: "f1", label: "Viernes 19/6", teamA: ["Roman", "Nahue"], teamB: ["Gonza", "Luis"], winner: null },
  { id: "f2", label: "Lunes 22/6",   teamA: ["Gonza", "Luis"],  teamB: ["Roman", "Nahue"], winner: null },
  { id: "f3", label: "Viernes 26/6", teamA: ["Gonza", "Roman"], teamB: ["Luis", "Nahue"],  winner: null },
  { id: "f4", label: "Lunes 29/6",   teamA: ["Roman", "Luis"],  teamB: ["Gonza", "Nahue"], winner: null },
];

const defaultNextMatches = [
  { id: "f5", label: "Viernes 3/7",  teamA: ["Gonza","Roman"],  teamB: ["Luis","Nahue"], winner: null },
  { id: "f6", label: "Lunes 6/7",    teamA: ["Roman","Luis"],  teamB: ["Gonza","Nahue"], winner: null },
  { id: "f7", label: "Viernes 10/7", teamA: ["Gonza","Nahue"], teamB: ["Roman","Luis"], winner: null },
  { id: "f8", label: "Lunes 13/7",   teamA: ["Gonza","Luis"],  teamB: ["Roman","Nahue"], winner: null },
  { id: "f9", label: "Viernes 17/7", teamA: ["Roman","Nahue"], teamB: ["Gonza","Luis"], winner: null },
  { id: "f10", label:"Lunes 20/7",   teamA: ["Gonza","Roman"], teamB: ["Luis","Nahue"], winner: null },
  { id: "f11", label:"Viernes 24/7", teamA: ["Roman","Luis"],  teamB: ["Gonza","Nahue"], winner: null },
  { id: "f12", label:"Lunes 27/7",   teamA: ["Gonza","Nahue"], teamB: ["Roman","Luis"], winner: null }
];

let matches = JSON.parse(JSON.stringify(defaultMatches));
let nextMatches = JSON.parse(JSON.stringify(defaultNextMatches));
let unlocked = false;
let saving = false;
let activeTab = 'current'; // 'current' or 'next'

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const t = document.getElementById('statusText');
  dot.className = 'dot' + (state === 'offline' ? ' offline' : state === 'syncing' ? ' syncing' : '');
  t.textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function loadFromCloud() {
  if (!JSONBIN_API_KEY || JSONBIN_API_KEY.startsWith("PEGA_") || !BIN_ID || BIN_ID.startsWith("PEGA_")) {
    setStatus('offline', 'Sin conexión configurada — usando datos locales de este dispositivo');
    showError('Este sitio todavía no está conectado a una base de datos compartida. Seguí las instrucciones en el código (sección CONFIGURACIÓN) para que todos vean la misma tabla.');
    render();
    return;
  }
  setStatus('syncing', 'Sincronizando...');
  try {
    const res = await fetch(`${JSONBIN_BASE}/${BIN_ID}/latest`, {
      headers: { "X-Master-Key": JSONBIN_API_KEY }
    });
    if (!res.ok) throw new Error('No se pudo leer la base de datos (' + res.status + ')');
    const json = await res.json();
    if (json.record) {
      if (json.record.matches) matches = json.record.matches;
      if (json.record.nextMatches) nextMatches = json.record.nextMatches;
    }
    setStatus('', 'Sincronizado');
    showError('');
  } catch (e) {
    setStatus('offline', 'Sin conexión — mostrando últimos datos disponibles');
    showError('No se pudo conectar a la base de datos compartida: ' + e.message);
  }
  render();
}

async function saveToCloud() {
  if (!JSONBIN_API_KEY || JSONBIN_API_KEY.startsWith("PEGA_") || !BIN_ID || BIN_ID.startsWith("PEGA_")) {
    return;
  }
  saving = true;
  setStatus('syncing', 'Guardando...');
  try {
    const res = await fetch(`${JSONBIN_BASE}/${BIN_ID}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": JSONBIN_API_KEY
      },
      body: JSON.stringify({ matches, nextMatches })
    });
    if (!res.ok) throw new Error('No se pudo guardar (' + res.status + ')');
    setStatus('', 'Sincronizado');
    showError('');
  } catch (e) {
    setStatus('offline', 'No se pudo guardar el último cambio');
    showError('Error al guardar: ' + e.message);
  }
  saving = false;
}

function computeStandings() {
  const stats = {};
  players.forEach(p => stats[p] = { name: p, pj: 0, pg: 0, pp: 0, pts: 0 });
  matches.forEach(m => {
    if (m.winner) {
      const winTeam = m.winner === 'A' ? m.teamA : m.teamB;
      const loseTeam = m.winner === 'A' ? m.teamB : m.teamA;
      winTeam.forEach(p => { stats[p].pj++; stats[p].pg++; stats[p].pts += 3; });
      loseTeam.forEach(p => { stats[p].pj++; stats[p].pp++; });
    }
  });
  return Object.values(stats).sort((x, y) => y.pts - x.pts || y.pg - x.pg);
}

function render() {
  const standings = computeStandings();
  const tbody = document.getElementById('standingsBody');
  const topScore = standings.length ? standings[0].pts : 0;
  const topCount = standings.filter(s => s.pts === topScore).length;
  const showLeader = topCount === 1;
  tbody.innerHTML = standings.map(s => `
    <tr>
      <td>${showLeader && s.pts === topScore ? '👑 ' : ''}${s.name}</td>
      <td>${s.pj}</td>
      <td>${s.pg}</td>
      <td>${s.pp}</td>
      <td class="pts">${s.pts}</td>
    </tr>
  `).join('');

  const list = document.getElementById('matchesList');
  list.innerHTML = matches.map(m => `
    <div class="match-card">
      <p class="match-date">${m.label}</p>
      <div class="match-row">
        <button class="team-btn ${m.winner === 'A' ? 'winner' : ''}" data-match="${m.id}" data-side="A" ${unlocked ? '' : 'disabled'}>${m.teamA.join(' / ')}</button>
        <span class="vs">vs</span>
        <button class="team-btn ${m.winner === 'B' ? 'winner' : ''}" data-match="${m.id}" data-side="B" ${unlocked ? '' : 'disabled'}>${m.teamB.join(' / ')}</button>
      </div>
    </div>
  `).join('');

  const nextList = document.getElementById('nextMatchesList');
  nextList.innerHTML = nextMatches.map(m => `
    <div class="match-card">
      <p class="match-date">${m.label}</p>
      <div class="match-row">
        <button class="team-btn ${m.winner === 'A' ? 'winner' : ''}" data-list="next" data-match="${m.id}" data-side="A" ${unlocked ? '' : 'disabled'}>${m.teamA.join(' / ')}</button>
        <span class="vs">vs</span>
        <button class="team-btn ${m.winner === 'B' ? 'winner' : ''}" data-list="next" data-match="${m.id}" data-side="B" ${unlocked ? '' : 'disabled'}>${m.teamB.join(' / ')}</button>
      </div>
    </div>
  `).join('');

  // Handlers for current matches
  list.querySelectorAll('button[data-match]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!unlocked) return;
      const id = btn.getAttribute('data-match');
      const side = btn.getAttribute('data-side');
      const match = matches.find(m => m.id === id);
      match.winner = (match.winner === side) ? null : side;
      render();
      await saveToCloud();
    });
  });
  // Handlers for next-month matches
  nextList.querySelectorAll('button[data-list="next"]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!unlocked) return;
      const id = btn.getAttribute('data-match');
      const side = btn.getAttribute('data-side');
      const match = nextMatches.find(m => m.id === id);
      match.winner = (match.winner === side) ? null : side;
      render();
      await saveToCloud();
    });
  });

  const pinBar = document.getElementById('pinBar');
  if (unlocked) {
    pinBar.innerHTML = `<span class="unlocked-badge">✓ Edición habilitada en este dispositivo</span>`;
  }
}

document.getElementById('pinBtn').addEventListener('click', () => {
  const val = document.getElementById('pinInput').value;
  if (val === EDIT_PIN) {
    unlocked = true;
    render();
  } else {
    alert('PIN incorrecto');
  }
});
document.getElementById('pinInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('pinBtn').click();
});

loadFromCloud();
// Refresca cada 8s para reflejar cambios de otros compañeros sin recargar la página
setInterval(loadFromCloud, 8000);

// Theme toggle
const themeToggle = document.getElementById('themeToggle');
function applyTheme(t) {
  if (t === 'dark') {
    document.documentElement.classList.remove('light');
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
    document.documentElement.classList.add('light');
  }
  localStorage.setItem('theme', t);
  if (themeToggle) {
    if (t === 'dark') {
      themeToggle.textContent = '☀️';
      themeToggle.setAttribute('aria-label','Cambiar a modo claro');
    } else {
      themeToggle.textContent = '🌙';
      themeToggle.setAttribute('aria-label','Cambiar a modo oscuro');
    }
  }
}
const savedTheme = localStorage.getItem('theme') || 'dark';
applyTheme(savedTheme);
if (themeToggle) themeToggle.addEventListener('click', () => applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'));

// Tabs
document.getElementById('tabFixture').addEventListener('click', () => {
  activeTab = 'current';
  document.getElementById('matchesList').style.display = '';
  document.getElementById('nextMatchesList').style.display = 'none';
  document.getElementById('tabFixture').classList.add('active');
  document.getElementById('tabNext').classList.remove('active');
});
document.getElementById('tabNext').addEventListener('click', () => {
  activeTab = 'next';
  document.getElementById('matchesList').style.display = 'none';
  document.getElementById('nextMatchesList').style.display = '';
  document.getElementById('tabNext').classList.add('active');
  document.getElementById('tabFixture').classList.remove('active');
});
</script>
</body>
</html>
